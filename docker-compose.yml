version: '3.8'

services:
  db:
    build:
      context: ./backend/db
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: marsad
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/marsad
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
       - db
    volumes:
      - ./data:/data
      - ./pipeline:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
